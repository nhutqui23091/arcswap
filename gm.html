<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0A1628;--bg2:#0F1E36;--surface:rgba(255,255,255,0.035);--surface2:rgba(255,255,255,0.065);--border:rgba(255,255,255,0.09);--border2:rgba(255,255,255,0.16);--text:#F5F7FB;--muted:#A4B8D0;--muted-soft:#7E92AE;--arc1:#4DD6DB;--arc2:#4A7BEC;--arc3:#F4C89A;--arc4:#7BE495;--display:'Space Grotesk','Inter',system-ui,sans-serif;--font:'DM Sans','Inter',system-ui,sans-serif;--mono:'Space Mono','DM Mono',ui-monospace,monospace}

.gm-page{position:relative;z-index:1;max-width:960px;margin:0 auto;padding:44px 24px 80px;display:flex;flex-direction:column;align-items:center;gap:22px}
@media(max-width:900px){.gm-page{padding:72px 18px 60px}}
.gm-grid{display:grid;grid-template-columns:3fr 7fr;gap:24px;align-items:start;width:100%}
@media(max-width:768px){.gm-grid{grid-template-columns:1fr}}
.gm-checkin-col{display:flex;flex-direction:column;align-items:center;gap:22px;width:100%}

/* HANG */
.gm-hang{display:flex;flex-direction:column;align-items:center;gap:14px}
.gm-rope-wrap{display:flex;flex-direction:column;align-items:center;animation:gm-sway 4s ease-in-out infinite;transform-origin:top center}
.gm-rope{width:1px;height:48px;background:linear-gradient(to bottom,transparent,rgba(77,214,219,.3))}
.gm-logo{width:48px;height:48px;border-radius:12px;box-shadow:0 8px 28px rgba(77,214,219,.25),0 3px 10px rgba(0,0,0,.45);animation:gm-bob 4s ease-in-out infinite}
@keyframes gm-sway{0%,100%{transform:rotate(-1.8deg)}50%{transform:rotate(1.8deg)}}
@keyframes gm-bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.gm-energy-wrap{display:flex;flex-direction:column;align-items:center;gap:5px}
.gm-energy-bar{width:140px;height:12px;border-radius:99px;background:rgba(255,255,255,.07);border:1px solid var(--border);overflow:hidden}
.gm-energy-fill{height:100%;width:0%;border-radius:99px;background:linear-gradient(90deg,var(--arc1),var(--arc2))}
.gm-energy-pct{font-family:var(--mono);font-size:11px;color:var(--muted-soft);letter-spacing:.06em}

/* STREAK */
.gm-streak-card{width:100%;padding:14px 16px;border:1px solid var(--border);border-radius:18px;background:rgba(255,255,255,.025);display:flex;flex-direction:column;align-items:center;gap:5px;text-align:center}
.gm-streak-num{font-family:var(--display);font-size:52px;font-weight:800;letter-spacing:-.04em;line-height:1;color:var(--text)}
.gm-streak-lbl{font-size:11.5px;font-family:var(--mono);letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
.gm-freezes{font-size:12px;color:var(--muted);margin-top:2px}
.gm-flame-ico{display:flex;justify-content:center;animation:gm-flicker 1.2s ease-in-out infinite}
@keyframes gm-flicker{0%,100%{transform:scale(1);opacity:1}35%{transform:scale(1.04) translateY(-1px);opacity:.9}65%{transform:scale(.98);opacity:.97}}

/* BUTTON */
.gm-btn-section{width:100%;display:flex;flex-direction:column;align-items:center;gap:9px}
.gm-hint{font-size:12px;color:var(--muted);min-height:17px;text-align:center}
.gm-btn{width:100%;padding:15px;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;border:1px solid var(--border2);background:rgba(255,255,255,.06);color:var(--text);font-family:var(--font);transition:border-color .2s,background .2s,box-shadow .2s;user-select:none;-webkit-user-select:none;touch-action:none}
.gm-btn:hover:not(:disabled){background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.26)}
.gm-btn.active{border-color:var(--arc1);background:rgba(77,214,219,.1);box-shadow:0 0 22px rgba(77,214,219,.22)}
.gm-btn.checked{background:rgba(123,228,149,.07);border-color:rgba(123,228,149,.28);color:var(--arc4);cursor:default}
.gm-btn.success{border-color:var(--arc4);color:var(--arc4);animation:gm-pulse .55s ease-out}
.gm-btn:disabled:not(.checked){opacity:.42;cursor:not-allowed}
@keyframes gm-pulse{0%{transform:scale(1)}30%{transform:scale(1.03)}100%{transform:scale(1)}}

/* TASKS */
.gm-sec-label{font-size:11px;font-family:var(--mono);font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
.gm-sec-label::before{content:'// ';color:rgba(140,160,189,.5);font-weight:400}
.gm-tasks-wrap{width:100%;display:flex;flex-direction:column;gap:9px}
.gm-task{padding:13px 15px;border:1px solid var(--border);border-radius:12px;background:var(--surface);display:flex;align-items:center;gap:11px;transition:border-color .2s}
.gm-task.done{border-color:rgba(123,228,149,.3);background:rgba(123,228,149,.03)}
.t-ico{width:32px;height:32px;border-radius:9px;background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.t-ico.done{background:rgba(123,228,149,.14)}
.t-body{flex:1;min-width:0}
.t-name{font-size:13px;font-weight:600;color:var(--text)}
.t-sub{font-size:11.5px;color:var(--muted);margin-top:2px}
.t-sub.ok{color:var(--arc4)}
.t-acts{display:flex;gap:6px;flex-shrink:0}
.t-acts a,.t-acts button{padding:5px 11px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;text-decoration:none;font-family:var(--font);transition:all .15s;white-space:nowrap}
.t-acts a:hover,.t-acts button:hover{color:var(--text);border-color:var(--border2);background:var(--surface2)}

/* BADGES */
.gm-badges-section{width:100%}
.gm-badge-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
@media(max-width:768px){.gm-badge-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:420px){.gm-badge-grid{grid-template-columns:1fr}}
.gm-badge{padding:14px 10px 12px;border:1px solid rgba(255,255,255,.06);border-radius:16px;background:rgba(255,255,255,.018);display:flex;flex-direction:column;align-items:center;gap:8px;text-align:center;cursor:pointer;position:relative;transition:border-color .2s}
.gm-badge.locked{opacity:.5;filter:grayscale(1)}
.gm-badge.pending{filter:grayscale(.5)}
.gm-badge.unlocked{border-color:rgba(77,214,219,.3);animation:gm-badge-glow 3s ease-in-out infinite}
@keyframes gm-badge-glow{0%,100%{box-shadow:0 0 12px rgba(77,214,219,.12)}50%{box-shadow:0 0 24px rgba(77,214,219,.3)}}
.gm-badge-img{width:96px;height:96px;pointer-events:none;object-fit:contain}
.gm-badge-name{font-size:13px;font-weight:700;color:var(--text);font-family:var(--font)}
.gm-badge-tip{display:none;position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:#0F1E36;border:1px solid var(--border);border-radius:8px;padding:7px 12px;font-size:11px;color:var(--muted);white-space:normal;text-align:center;width:160px;pointer-events:none;z-index:10}
.gm-badge:hover .gm-badge-tip,.gm-badge.tip-open .gm-badge-tip{display:block}
.gm-badge-vbtn{padding:5px 12px;border-radius:8px;border:1px solid var(--border);background:rgba(255,255,255,.06);color:var(--muted);font-size:11px;font-weight:600;cursor:pointer;font-family:var(--font);transition:all .15s}
.gm-badge-vbtn:hover{color:var(--text);border-color:var(--border2);background:var(--surface2)}

.gm-foot{font-size:12px;font-family:var(--mono);color:var(--muted-soft);text-align:center}
</style>
</head>
<body>

<div class="gm-page">

  <div class="gm-grid">
    <div class="gm-checkin-col">

      <div class="gm-hang">
        <div class="gm-rope-wrap">
          <div class="gm-rope"></div>
          <img src="/assets/logos/mark-oneliq.png" class="gm-logo" alt="Oneliq"/>
        </div>
        <div class="gm-energy-wrap">
          <div class="gm-energy-bar"><div class="gm-energy-fill" id="ef"></div></div>
          <div class="gm-energy-pct" id="ep">0%</div>
        </div>
      </div>

      <div class="gm-streak-card">
        <span id="gmflame" class="gm-flame-ico" style="display:none"></span>
        <div class="gm-streak-num" id="snum">0</div>
        <div class="gm-streak-lbl">Day streak</div>
        <div class="gm-freezes" id="ftxt">3 freezes left</div>
      </div>

      <div class="gm-btn-section">
        <div class="gm-hint" id="hint">Connect wallet to check in</div>
        <button class="gm-btn" id="gmbtn" type="button" disabled>Hold to GM</button>
      </div>

    </div>

    <div class="gm-tasks-wrap">
      <div class="gm-sec-label">Onboarding</div>

      <div class="gm-task" id="td">
        <div class="t-ico" id="td-ico">💬</div>
        <div class="t-body">
          <div class="t-name">Join Oneliq Discord</div>
          <div class="t-sub" id="td-sub">Link Discord in Profile after joining</div>
        </div>
        <div class="t-acts" id="td-acts">
          <a href="https://discord.com/invite/7XUPdWWrGk" target="_blank" rel="noopener noreferrer">Join</a>
        </div>
      </div>

      <div class="gm-task" id="tx">
        <div class="t-ico" id="tx-ico">𝕏</div>
        <div class="t-body">
          <div class="t-name">Follow Oneliq on X</div>
          <div class="t-sub" id="tx-sub">Set X handle in Profile first</div>
        </div>
        <div class="t-acts" id="tx-acts">
          <a href="https://x.com/oneliq_" target="_blank" rel="noopener noreferrer">Open X</a>
        </div>
      </div>

    </div>
  </div>

  <div class="gm-badges-section">
    <div class="gm-sec-label">Badges</div>
    <div class="gm-badge-grid" id="gbadges"></div>
  </div>


</div>

<script src="https://cdn.jsdelivr.net/npm/ethers@6.13.4/dist/ethers.umd.min.js"
        integrity="sha384-6Zl0Pc8zjSz8KvmNeXRvUQgY4ryFb+BwDvKCmLYcBME0joAaru491tQgi9B7zsMM"
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script src="/assets/appkit.bundle.js?v=1.0.0"></script>
<script src="/assets/arc-core.js?v=9.8.4"></script>
<script src="/assets/arc-ui.js?v=9.10.7"></script>
<script>
(async () => {
  const ARC = window.ARC;
  await ArcUI.bootApp('gm');

  const ef   = document.getElementById('ef');
  const ep   = document.getElementById('ep');
  const snum = document.getElementById('snum');
  const ftxt = document.getElementById('ftxt');
  const hint = document.getElementById('hint');
  const btn  = document.getElementById('gmbtn');

  let gmState   = null;
  let discState = null;
  let filling   = false;
  let fillRaf   = null;
  let fillStart = null;
  const FILL_MS = 1200;

  function addr()    { return ARC.wallet.address?.toLowerCase(); }
  function utcDay()  { return new Date().toISOString().slice(0, 10); }

  // -- Badge definitions --
  const BADGE_META = {
    welcome: { img: '/assets/badges/welcome.png', name: 'Welcome to Oneliq', tip: 'Earned on your very first GM check-in' },
    streak7: { img: '/assets/badges/streak7.png', name: '7-Day Streak',      tip: 'Check in 7 days in a row' },
    tx100:   { img: '/assets/badges/tx100.png',   name: '100 Transactions',  tip: '100 on-chain transactions on Arc Testnet' },
    og:      { img: '/assets/badges/og.png',      name: 'OG',                tip: 'Verified OG role in Oneliq Discord' },
  };

  // -- Streak display --
  const SNOW_SVG = '<svg width="13" height="13" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" style="vertical-align:-2px;margin-right:3px"><g stroke="#7DD8E8" stroke-width="1.6" stroke-linecap="round"><line x1="8" y1="1" x2="8" y2="15"/><line x1="1" y1="4.5" x2="15" y2="11.5"/><line x1="15" y1="4.5" x2="1" y2="11.5"/><line x1="5" y1="3.5" x2="8" y2="5.5"/><line x1="11" y1="3.5" x2="8" y2="5.5"/><line x1="5" y1="12.5" x2="8" y2="10.5"/><line x1="11" y1="12.5" x2="8" y2="10.5"/></g></svg>';

  function renderStreak(s) {
    const n = s?.streak || 0;
    const freezes = typeof s?.freezes_left === 'number' ? s.freezes_left : 3;

    // Flame icon
    const flameEl = document.getElementById('gmflame');
    if (flameEl) {
      if (n <= 0) {
        flameEl.innerHTML = '';
        flameEl.style.display = 'none';
      } else {
        let gradStops;
        if (n >= 100) {
          gradStops = '<stop offset="0%" stop-color="#ff6b6b"/><stop offset="33%" stop-color="#ffd93d"/><stop offset="66%" stop-color="#6bff72"/><stop offset="100%" stop-color="#4dd6db"/>';
        } else if (n >= 30) {
          gradStops = '<stop offset="0%" stop-color="#B4E6FF"/><stop offset="100%" stop-color="#0066FF"/>';
        } else if (n >= 7) {
          gradStops = '<stop offset="0%" stop-color="#FFE566"/><stop offset="100%" stop-color="#FF4500"/>';
        } else {
          gradStops = '<stop offset="0%" stop-color="#FFD080"/><stop offset="100%" stop-color="#C81E1E"/>';
        }
        flameEl.style.display = '';
        flameEl.innerHTML = '<svg viewBox="0 0 40 54" width="36" height="49" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="gfg" x1="0" y1="1" x2="0" y2="0">' + gradStops + '</linearGradient></defs><path fill="url(#gfg)" d="M20,52 C12,47 5,37 8,24 C9,17 14,13 12,4 C16,12 18,10 17,3 L20,0 L23,3 C22,10 24,12 28,4 C26,13 31,17 32,24 C35,37 28,47 20,52Z"/></svg>';
      }
    }

    // Number
    let label = n + '';
    let style = 'font-family:var(--display);font-size:52px;font-weight:800;letter-spacing:-.04em;line-height:1;';
    if (n >= 100) {
      style += 'background:linear-gradient(90deg,#ff6b6b,#ffd93d,#6bff72,#4dd6db,#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text';
    } else if (n >= 30) {
      style += 'color:#4DD6DB';
    } else if (n >= 7) {
      style += 'color:#FFB454';
    } else {
      style += 'color:var(--text)';
    }
    snum.style.cssText = style;
    snum.textContent = label;
    ftxt.innerHTML = SNOW_SVG + freezes + ' freeze' + (freezes !== 1 ? 's' : '') + ' left';
  }

  // -- Badges --
  function renderBadges(badges) {
    const el = document.getElementById('gbadges');
    if (!el) return;
    const earned = new Set(badges || []);
    let html = '';
    for (const [id, m] of Object.entries(BADGE_META)) {
      const unlocked = earned.has(id);
      let cls;
      if (unlocked)         cls = 'gm-badge unlocked';
      else if (id === 'og') cls = 'gm-badge pending';
      else                  cls = 'gm-badge locked';
      const vbtn = (id === 'og' && !unlocked)
        ? '<button class="gm-badge-vbtn" onclick="event.stopPropagation();window._verifyOg()">Verify OG</button>'
        : '';
      html += '<div class="' + cls + '" onclick="this.classList.toggle(\'tip-open\')">'
        + '<img src="' + m.img + '" class="gm-badge-img" alt="' + m.name + '" loading="lazy"/>'
        + '<span class="gm-badge-name">' + m.name + '</span>'
        + '<div class="gm-badge-tip">' + m.tip + '</div>'
        + vbtn
        + '</div>';
    }
    el.innerHTML = html;
  }

  // -- OG role verify --
  window._verifyOg = async function() {
    const a = addr();
    if (!a) { ArcUI.toast('error', 'Not connected', 'Connect wallet first.'); return; }
    const vbtn = document.querySelector('.gm-badge-vbtn');
    if (vbtn) { vbtn.disabled = true; vbtn.textContent = 'Verifying...'; }
    try {
      const r = await fetch('/auth/og-verify', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ address: a }),
      });
      const data = await r.json();
      if (!r.ok) {
        ArcUI.toast('error', 'OG verify failed', data.error || 'Error');
        if (vbtn) { vbtn.disabled = false; vbtn.textContent = 'Verify OG'; }
        return;
      }
      if (data.awarded) {
        gmState = { ...gmState, badges: data.badges };
        renderBadges(gmState.badges);
        ArcUI.toast('success', 'OG Badge Earned!', 'Welcome to the OG club.');
      } else {
        ArcUI.toast('', 'Not OG', data.message || 'OG role not found.');
        if (vbtn) { vbtn.disabled = false; vbtn.textContent = 'Verify OG'; }
      }
    } catch(e) {
      ArcUI.toast('error', 'Error', e.message || 'Verification failed');
      if (vbtn) { vbtn.disabled = false; vbtn.textContent = 'Verify OG'; }
    }
  };

  // -- Tasks --
  function renderTasks() {
    const a = addr();
    if (!a) return;
    const xHandle = (localStorage.getItem('oneliq_profile_x_' + a) || '');
    const xDone   = gmState?.x_follow_done;
    const dcDone  = !!(discState?.discord_username);

    // Discord task
    const tdCard = document.getElementById('td');
    const tdIco  = document.getElementById('td-ico');
    const tdSub  = document.getElementById('td-sub');
    const tdActs = document.getElementById('td-acts');
    if (dcDone) {
      tdCard.classList.add('done'); tdIco.classList.add('done');
      tdIco.textContent = '✓';
      tdSub.textContent = discState.discord_username;
      tdSub.classList.add('ok');
      tdActs.innerHTML  = '';
    } else {
      tdCard.classList.remove('done'); tdIco.classList.remove('done');
      tdIco.textContent = '💬';
      tdSub.classList.remove('ok');
      tdSub.textContent = 'Link Discord via Profile after joining';
      tdActs.innerHTML  = '<a href="https://discord.com/invite/7XUPdWWrGk" target="_blank" rel="noopener noreferrer">Join</a>';
    }

    // X task
    const txCard = document.getElementById('tx');
    const txIco  = document.getElementById('tx-ico');
    const txSub  = document.getElementById('tx-sub');
    const txActs = document.getElementById('tx-acts');
    if (xDone) {
      txCard.classList.add('done'); txIco.classList.add('done');
      txIco.textContent = '✓';
      txSub.textContent = xHandle || 'Done';
      txSub.classList.add('ok');
      txActs.innerHTML  = '';
    } else {
      txCard.classList.remove('done'); txIco.classList.remove('done');
      txIco.textContent = '𝕏';
      txSub.classList.remove('ok');
      if (xHandle) {
        txSub.textContent = xHandle;
        txActs.innerHTML  = '<a href="https://x.com/oneliq_" target="_blank" rel="noopener noreferrer">Open X</a><button id="xdone">Mark done</button>';
        document.getElementById('xdone').onclick = markXDone;
      } else {
        txSub.textContent = 'Set X handle in Profile first';
        txActs.innerHTML  = '<a href="https://x.com/oneliq_" target="_blank" rel="noopener noreferrer">Open X</a>';
      }
    }
  }

  async function markXDone() {
    const a = addr(); if (!a) return;
    try {
      const r = await fetch('/auth/gm', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'x_follow', address: a }) });
      if (r.ok) { gmState = await r.json(); renderTasks(); ArcUI.toast('success', 'Done!', 'X follow marked.'); }
    } catch(e) { console.error(e); }
  }

  // -- Energy bar --
  function setEnergy(pct) {
    ef.style.width = (pct * 100).toFixed(1) + '%';
    ep.textContent = Math.round(pct * 100) + '%';
  }
  function drainEnergy() {
    ef.style.transition = 'width 0.5s ease';
    setEnergy(0);
    setTimeout(() => { ef.style.transition = 'none'; }, 520);
  }

  // -- Press-and-hold --
  function onDown(e) {
    e.preventDefault();
    if (btn.disabled || filling) return;
    filling = true; fillStart = Date.now();
    ef.style.transition = 'none';
    btn.classList.add('active');
    animFill();
  }
  function onUp() {
    if (!filling) return;
    filling = false;
    if (fillRaf) cancelAnimationFrame(fillRaf);
    btn.classList.remove('active');
    drainEnergy();
  }
  function animFill() {
    if (!filling) return;
    const pct = Math.min((Date.now() - fillStart) / FILL_MS, 1);
    setEnergy(pct);
    if (pct < 1) { fillRaf = requestAnimationFrame(animFill); }
    else { filling = false; btn.classList.remove('active'); triggerCheckin(); }
  }
  btn.addEventListener('pointerdown', onDown);
  btn.addEventListener('pointerup',   onUp);
  btn.addEventListener('pointerleave',onUp);
  btn.addEventListener('pointercancel',onUp);

  // -- Check-in flow (real Arc Testnet tx) --
  const ARC_CHAIN_HEX = '0x4cef52'; // chainId 5042002
  const ARC_EXPLORER  = 'https://testnet.arcscan.app';

  async function triggerCheckin() {
    btn.disabled = true; btn.textContent = 'Preparing...';
    hint.textContent = 'Switching to Arc Testnet if needed';
    try {
      const a     = addr();
      const today = utcDay();

      if (!window.ethereum) throw new Error('No wallet provider found. Install MetaMask or a compatible wallet.');

      // Ensure Arc Testnet is the active chain
      const currentChain = await window.ethereum.request({ method: 'eth_chainId' });
      if (currentChain !== ARC_CHAIN_HEX) {
        btn.textContent = 'Switching to Arc...';
        try {
          await window.ethereum.request({ method: 'wallet_switchEthereumChain', params: [{ chainId: ARC_CHAIN_HEX }] });
        } catch(sw) {
          if (sw.code === 4902) {
            await window.ethereum.request({
              method: 'wallet_addEthereumChain',
              params: [{
                chainId:            ARC_CHAIN_HEX,
                chainName:          'Arc Testnet',
                rpcUrls:            ['https://rpc.testnet.arc.network'],
                nativeCurrency:     { name: 'USDC', symbol: 'USDC', decimals: 18 },
                blockExplorerUrls:  [ARC_EXPLORER],
              }],
            });
          } else throw sw;
        }
      }

      // Encode "GM YYYY-MM-DD" as calldata so it is visible on-chain
      const gmStr   = 'GM ' + today;
      const hexData = '0x' + Array.from(gmStr).map(c => c.charCodeAt(0).toString(16).padStart(2, '0')).join('');

      btn.textContent = 'Confirm in wallet';
      hint.textContent = 'Approve the Arc Testnet transaction';

      const provider = new ethers.BrowserProvider(window.ethereum);
      const signer   = await provider.getSigner();
      const tx       = await signer.sendTransaction({ to: a, value: 0n, data: hexData });
      const txHash   = tx.hash;

      // Show confirming state with explorer link while backend verifies
      btn.textContent = 'Confirming on Arc...';
      hint.innerHTML  = 'TX: <a href="' + ARC_EXPLORER + '/tx/' + txHash
        + '" target="_blank" rel="noopener" style="color:var(--arc1);text-decoration:none">'
        + txHash.slice(0, 16) + '...</a>';
      setEnergy(0.85);

      // Backend verifies tx via Arc RPC (retries up to ~10s)
      const res = await fetch('/auth/gm', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ address: a, txHash, date: today }),
      });

      const data = await res.json();
      if (!res.ok || data.error) throw new Error(data.error || 'Server error');

      gmState = data;
      setEnergy(1);
      btn.classList.add('success');
      btn.textContent = '✓ GM! Day ' + data.streak;
      hint.textContent = data.streak + ' day streak' + (data.freeze_used ? ' · freeze used' : '');
      renderStreak(data);
      renderBadges(data.badges);

      setTimeout(() => {
        drainEnergy();
        btn.classList.remove('success');
        btn.classList.add('checked');
        btn.textContent = '✓ Checked in today. Come back tomorrow.';
        btn.disabled = true;
        hint.textContent = '';
        ArcUI.toast('success', 'GM! Day ' + data.streak, data.freeze_used ? 'Freeze used.' : 'Keep it up.');
      }, 2400);

    } catch(e) {
      drainEnergy();
      btn.disabled = false;
      const msg = e?.message || String(e);
      if (/reject|denied|ACTION_REJECTED|user rejected/i.test(msg)) {
        btn.textContent = 'Hold to GM'; hint.textContent = 'Press and hold to check in';
        ArcUI.toast('', 'Cancelled', 'Transaction cancelled.');
      } else {
        btn.textContent = 'Try again'; hint.textContent = msg.slice(0, 80);
        ArcUI.toast('error', 'Check-in failed', msg.slice(0, 60));
      }
    }
  }

  // -- Load --
  async function loadAll() {
    const a = addr();
    if (!a) {
      gmState = discState = null;
      renderStreak(null); renderTasks(); renderBadges([]);
      btn.disabled = true; btn.className = 'gm-btn';
      btn.textContent = 'Hold to GM'; hint.textContent = 'Connect wallet to check in';
      return;
    }
    try {
      const [gr, dr] = await Promise.all([
        fetch('/auth/gm?address=' + a),
        fetch('/auth/profile/' + a),
      ]);
      gmState   = gr.ok  ? await gr.json() : null;
      discState = dr.ok  ? await dr.json() : null;
    } catch(e) { console.warn('[gm] load:', e); }

    renderStreak(gmState);
    renderTasks();
    renderBadges(gmState?.badges);

    if (gmState?.already_checked_in) {
      btn.disabled = true; btn.className = 'gm-btn checked';
      btn.textContent = '✓ Checked in today. Come back tomorrow.';
      hint.textContent = '';
    } else {
      btn.disabled = false; btn.className = 'gm-btn';
      btn.textContent = 'Hold to GM'; hint.textContent = 'Press and hold to check in';
    }
  }

  ARC.wallet.on(loadAll);
  if (ARC.wallet.address) loadAll();
})();
</script>

</html>
