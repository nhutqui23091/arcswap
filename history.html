<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>

<style>
/* ============================================================
   HISTORY — minimal receipt feed.
   One hero block, one segmented pill control, one feed list.
   No charts, no toolbar, no modal. Each row is a receipt.
============================================================ */

.hist-wrap{position:relative;z-index:2;max-width:980px;margin:0 auto;padding:48px 36px 80px}

/* HERO — one big glass card */
.hist-hero{position:relative;padding:38px 40px 36px;border-radius:24px;background:var(--surface);border:1px solid var(--border);backdrop-filter:blur(20px);overflow:hidden;margin-bottom:22px}
.hist-hero::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent 10%,rgba(77,214,219,.45) 50%,transparent 90%)}
.hist-hero::after{content:'';position:absolute;right:-160px;top:-160px;width:480px;height:480px;border-radius:50%;background:radial-gradient(circle,rgba(77,214,219,.10) 0%,transparent 60%);pointer-events:none}
.hist-eyebrow{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--arc1);margin-bottom:14px;display:inline-block}
.hist-title{font-family:var(--display);font-size:clamp(34px,4.4vw,52px);font-weight:700;letter-spacing:-.025em;line-height:1.05;color:var(--text);max-width:680px;margin-bottom:16px}
.hist-title .accent{background:linear-gradient(135deg,var(--arc1),var(--arc2));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent}
.hist-sub{font-size:14.5px;color:var(--muted);max-width:560px;line-height:1.7}

/* SEGMENTED CONTROL — pill tabs */
.hist-tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;padding:5px;border-radius:16px;background:var(--surface);border:1px solid var(--border);backdrop-filter:blur(20px);margin-bottom:18px}
.hist-tab{padding:13px 18px;border-radius:12px;font-size:13.5px;font-weight:600;color:var(--muted);background:none;border:none;cursor:pointer;letter-spacing:-.005em;transition:all .18s;display:inline-flex;align-items:center;justify-content:center;gap:8px;font-family:var(--font);position:relative}
.hist-tab:hover{color:var(--text)}
.hist-tab.active{background:rgba(255,255,255,.06);color:var(--text);box-shadow:0 1px 0 rgba(255,255,255,.04) inset,0 6px 18px rgba(0,0,0,.18)}
.hist-tab .count{font-family:var(--mono);font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:20px;background:var(--surface2);color:var(--muted);letter-spacing:.04em;border:1px solid var(--border)}
.hist-tab.active .count{background:rgba(77,214,219,.14);border-color:rgba(77,214,219,.32);color:var(--arc1)}

/* FEED CARD */
.hist-feed{padding:8px;border-radius:20px;background:var(--surface);border:1px solid var(--border);backdrop-filter:blur(20px);min-height:380px;position:relative}

/* RECEIPT ROW */
.hist-row{display:grid;grid-template-columns:42px 1fr auto auto;gap:18px;align-items:center;padding:18px 20px;border-radius:14px;transition:all .15s;cursor:pointer;border:1px solid transparent}
.hist-row + .hist-row{border-top:1px solid var(--border)}
.hist-row:hover{background:rgba(255,255,255,.025);border-color:var(--border);border-top-color:var(--border)}
.hist-row:hover + .hist-row{border-top-color:transparent}

.hist-row-ico{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;flex-shrink:0}
.hist-row-ico.k-trade  {background:rgba(77,214,219,.10);color:var(--arc1)}
.hist-row-ico.k-balance{background:linear-gradient(135deg,rgba(74,123,236,.16),rgba(77,214,219,.08));color:var(--arc2)}
.hist-row-ico.k-agent  {background:linear-gradient(135deg,rgba(167,139,250,.18),rgba(74,123,236,.10));color:#A78BFA}
.hist-row-ico.k-fail   {background:rgba(255,107,138,.10);color:#FF8BA3}

.hist-row-main{min-width:0}
.hist-row-title{font-size:14.5px;font-weight:600;color:var(--text);letter-spacing:-.005em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:4px}
.hist-row-sub{font-size:11.5px;color:var(--muted);font-family:var(--mono);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.hist-row-sub .dot-sep{opacity:.35}
.hist-row-sub a{color:var(--muted);text-decoration:none;border-bottom:1px dashed transparent;transition:all .12s}
.hist-row-sub a:hover{color:var(--arc1);border-bottom-color:var(--arc1)}
.hist-chain-tag{display:inline-flex;align-items:center;gap:5px;padding:2px 8px;border-radius:6px;background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--text);font-size:11px;font-weight:600;letter-spacing:0}
.hist-chain-tag .cd{width:5px;height:5px;border-radius:50%}
.hist-row-arr{color:var(--arc1);font-weight:700;font-family:var(--mono)}

.hist-row-amt{font-family:var(--mono);font-size:15px;font-weight:700;color:var(--text);text-align:right;font-variant-numeric:tabular-nums;letter-spacing:-.01em}
.hist-row-amt small{display:block;font-size:10.5px;color:var(--muted);font-weight:500;margin-top:3px;letter-spacing:.04em}
.hist-row-amt.up{color:var(--arc4)}
.hist-row-amt.down{color:#F4C89A}

.hist-status{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:8px;font-size:10.5px;font-family:var(--mono);font-weight:700;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap}
.hist-status.completed{background:rgba(123,228,149,.10);border:1px solid rgba(123,228,149,.30);color:var(--arc4)}
.hist-status.pending,.hist-status.processing{background:rgba(255,204,119,.10);border:1px solid rgba(255,204,119,.32);color:var(--yellow)}
.hist-status.failed{background:rgba(255,107,138,.10);border:1px solid rgba(255,107,138,.30);color:#FF8BA3}
.hist-status .sd{width:5px;height:5px;border-radius:50%;background:currentColor;box-shadow:0 0 6px currentColor}
.hist-status.processing .sd,.hist-status.pending .sd{animation:hist-blink 1.4s infinite}
@keyframes hist-blink{0%,100%{opacity:1}50%{opacity:.35}}

/* EMPTY STATE */
.hist-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 24px;text-align:center}
.hist-empty-ico{width:54px;height:54px;border-radius:16px;background:linear-gradient(135deg,rgba(77,214,219,.10),rgba(74,123,236,.06));border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--arc1);margin-bottom:16px}
.hist-empty-t{font-size:14.5px;font-weight:600;color:var(--text);margin-bottom:6px;letter-spacing:-.005em}
.hist-empty-s{font-size:12.5px;color:var(--muted);max-width:320px;line-height:1.6;margin-bottom:18px}
.hist-empty-cta{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;border-radius:11px;background:rgba(77,214,219,.12);border:1px solid rgba(77,214,219,.32);color:var(--arc1);font-size:12.5px;font-weight:700;text-decoration:none;transition:all .15s}
.hist-empty-cta:hover{background:rgba(77,214,219,.18);border-color:rgba(77,214,219,.5)}

/* SKELETON */
.hist-skel{padding:18px 20px;display:grid;grid-template-columns:42px 1fr auto auto;gap:18px;align-items:center;border-top:1px solid var(--border)}
.hist-skel:first-child{border-top:none}
.hist-skel-line{background:linear-gradient(90deg,var(--surface) 0%,var(--surface2) 50%,var(--surface) 100%);background-size:200% 100%;animation:hist-shimmer 1.3s infinite;border-radius:6px;display:inline-block}
@keyframes hist-shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}

/* Tagline footer */
.hist-tag{text-align:center;font-family:var(--mono);font-size:11px;color:var(--muted-soft);letter-spacing:.18em;text-transform:uppercase;margin-top:40px;padding-top:24px;border-top:1px solid var(--border)}
.hist-tag b{color:var(--arc1);font-weight:700}

/* Responsive */
@media(max-width:900px){
  .hist-wrap{padding:72px 18px 60px}
}
@media(max-width:680px){
  .hist-wrap{padding:68px 14px 50px}
  .hist-hero{padding:28px 22px}
  .hist-row{grid-template-columns:38px 1fr auto;grid-template-rows:auto auto;gap:12px;padding:14px 14px}
  .hist-row-ico{width:38px;height:38px;grid-row:1/3}
  .hist-row-amt{grid-column:3;grid-row:1;font-size:13px}
  .hist-status{grid-column:3;grid-row:2;justify-self:end}
  .hist-tabs{grid-template-columns:repeat(4,1fr);gap:2px;padding:4px}
  .hist-tab{padding:11px 6px;font-size:12px;gap:5px}
  .hist-tab .count{display:none}
}
</style>
</head>
<body>

<!-- aurora + cursor + sidebar are injected by ArcUI.bootApp('history') below -->

<main class="hist-wrap">

  <!-- HERO -->
  <section class="hist-hero">
    <span class="hist-eyebrow">History</span>
    <h1 class="hist-title">Every transfer should read like a <span class="accent">receipt feed</span>.</h1>
    <p class="hist-sub">Not charts, not noise — just clear Trade, Balance, and Agent moments across your USDC activity on Arc.</p>
  </section>

  <!-- TABS -->
  <div class="hist-tabs" id="hist-tabs" role="tablist">
    <button class="hist-tab active" data-tab="all"     type="button" role="tab" aria-selected="true">All     <span class="count" id="ct-all">0</span></button>
    <button class="hist-tab"        data-tab="trade"   type="button" role="tab" aria-selected="false">Trade   <span class="count" id="ct-trade">0</span></button>
    <button class="hist-tab"        data-tab="balance" type="button" role="tab" aria-selected="false">Balance <span class="count" id="ct-balance">0</span></button>
    <button class="hist-tab"        data-tab="agent"   type="button" role="tab" aria-selected="false">Agent   <span class="count" id="ct-agent">0</span></button>
  </div>

  <!-- FEED -->
  <section class="hist-feed" id="hist-feed"></section>

  <div class="hist-tag"><b>One USDC.</b> One Balance. Everywhere.</div>
</main>

<script src="https://cdn.jsdelivr.net/npm/ethers@6.13.4/dist/ethers.umd.min.js"
        integrity="sha384-6Zl0Pc8zjSz8KvmNeXRvUQgY4ryFb+BwDvKCmLYcBME0joAaru491tQgi9B7zsMM"
        crossorigin="anonymous"
        referrerpolicy="no-referrer"></script>
<script src="/assets/arc-core.js?v=9.7.0"></script>
<script src="/assets/arc-gateway.js?v=9.6.2"></script>
<script src="/assets/arc-ui.js?v=9.7.6"></script>
<script>
(async () => {
  /* ============================================================
     History — minimal receipt feed.

     One feed, four tabs (All / Trade / Balance / Agent), nothing
     else. Each row is a single receipt: who, what, where, when.
     Click a row → open its on-chain explorer record.

     Data merges two sources (the only two ArcSwap itself owns):
       1. localStorage 'arc.trade.activity.v1' — trade.html writes
          swap/bridge/transfer rows here. 'bridge' rows are Balance
          (Unified Balance settlements); other kinds are Trade.
       2. /api/agent/list?owner + /api/agent/:id/executions — the
          server-side agent log. Local fallback (arcswap_execs)
          mirrors the same shape when the backend is unconfigured.
  ============================================================ */

  await ArcUI.bootApp('history');

  // ── CHAIN REGISTRY ────────────────────────────────────────────
  const CHIPS = [
    { id:'base',     arcKey:'baseSepolia',     short:'Base',  color:'#0052FF' },
    { id:'arc',      arcKey:'arc',             short:'Arc',   color:'#4DD6DB' },
    { id:'sepolia',  arcKey:'sepolia',         short:'Sep',   color:'#627EEA' },
    { id:'arbitrum', arcKey:'arbitrumSepolia', short:'Arb',   color:'#28A0F0' },
    { id:'optimism', arcKey:'optimismSepolia', short:'OP',    color:'#FF0420' },
    { id:'polygon',  arcKey:'polygonAmoy',     short:'Poly',  color:'#8247E5' },
    { id:'unichain', arcKey:'unichainSepolia', short:'Uni',   color:'#FF007A' },
    { id:'fuji',     arcKey:'avalancheFuji',   short:'Fuji',  color:'#E84142' },
  ];
  const BY_CHIP = Object.fromEntries(CHIPS.map(c => [c.id, c]));
  const BY_ARC  = Object.fromEntries(CHIPS.map(c => [c.arcKey, c]));
  function chainOf(key) { return BY_CHIP[key] || BY_ARC[key] || null; }
  function explorerTx(key, hash) {
    const arcKey = chainOf(key)?.arcKey;
    return ARC?.CHAINS?.[arcKey]?.explorerTx?.(hash) || '';
  }

  // ── STATE ─────────────────────────────────────────────────────
  const state = { addr: null, txs: [], tab: 'all' };

  // ── UTILS ─────────────────────────────────────────────────────
  function escapeHtml(s) {
    return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function shortHash(h, head = 7, tail = 5) {
    if (!h) return '';
    return h.length > head + tail + 2 ? `${h.slice(0, head)}…${h.slice(-tail)}` : h;
  }
  function fmtMoney(n, frac = 2) {
    if (n == null || isNaN(n)) return '—';
    const v = Number(n);
    if (!isFinite(v)) return '—';
    return v.toLocaleString('en-US', { minimumFractionDigits: frac, maximumFractionDigits: frac });
  }
  function fmtRelTime(ts) {
    if (!ts) return '—';
    const diff = Date.now() - ts;
    const s = Math.floor(diff / 1000);
    if (s < 60) return `${s}s ago`;
    const m = Math.floor(s / 60);
    if (m < 60) return `${m}m ago`;
    const h = Math.floor(m / 60);
    if (h < 24) return `${h}h ago`;
    const d = Math.floor(h / 24);
    if (d < 7) return `${d}d ago`;
    return new Date(ts).toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
  }

  // ── BACKEND (mirrors agent.html contract) ─────────────────────
  let backendStatus = null;
  async function api(path) {
    if (backendStatus === 'fallback') return { _fallback: true };
    try {
      const r = await fetch('/api/agent' + path, { headers: { 'Content-Type': 'application/json' }});
      if (r.status === 503) {
        const b = await r.json().catch(() => ({}));
        if (b.error === 'agent_storage_unconfigured') { backendStatus = 'fallback'; return { _fallback: true }; }
      }
      backendStatus = 'ok';
      if (r.status === 204) return [];
      const body = await r.json().catch(() => ({}));
      if (!r.ok) throw new Error(body.error || ('HTTP ' + r.status));
      return body;
    } catch (e) { console.warn('[history] api', path, e?.message || e); return null; }
  }

  // ── NORMALIZE ─────────────────────────────────────────────────
  // Map every input row to a single shape. `tab` is what decides which
  // segmented-control pill the row appears under.
  //   tab ∈ 'trade' | 'balance' | 'agent'
  function mapTradeRow(x, i) {
    // trade.html shape: { kind, chain, hash, status, text, at }
    // - kind 'bridge'  → Balance tab (Unified Balance settlement)
    // - kind 'swap' / 'transfer' → Trade tab
    const isBalance = x.kind === 'bridge';
    const tab = isBalance ? 'balance' : 'trade';
    const amtM = /(\d+(?:\.\d+)?)\s*USDC/i.exec(x.text || '');
    const amt = amtM ? parseFloat(amtM[1]) : null;
    // Sniff a dst chain out of the text (it's a free-form display string)
    let dst = '';
    const dstM = /→\s+([A-Za-z][A-Za-z\s]*)/.exec(x.text || '');
    if (dstM) {
      const guess = dstM[1].trim().toLowerCase().replace(/\s+/g,'');
      const c = CHIPS.find(c => c.short.toLowerCase() === guess || c.id === guess);
      dst = c?.id || '';
    }
    return {
      id: `trade-${x.hash || i}-${x.at}`,
      tab,
      kind: x.kind || 'transfer',
      title: x.text || (isBalance ? 'Cross-chain settlement' : 'Trade'),
      srcChain: BY_ARC[x.chain]?.id || x.chain,
      dstChain: dst,
      amount: amt,
      asset: 'USDC',
      status: x.status === 'done' ? 'completed' : (x.status || 'completed'),
      ts: x.at || Date.now(),
      hash: x.hash || '',
    };
  }
  function mapAgentExec(e, agent) {
    // Server shape: { type, detail, amount, time, hash?, simulated? }
    let status = 'completed';
    if (e.type === 'error' || e.type === 'paused' || e.type === 'revoked') status = 'failed';
    else if (e.type === 'cctp_burn') status = 'processing';
    else if (e.simulated) status = 'pending';
    const title = e.detail || (agent.name ? `${agent.name} · ${e.type}` : e.type);
    return {
      id: `agent-${agent.id}-${e.time || 0}-${Math.random().toString(36).slice(2,5)}`,
      tab: 'agent',
      kind: 'agent',
      title,
      srcChain: agent.sources?.[0] || '',
      dstChain: agent.targetChains?.[0] || agent.sources?.[0] || '',
      amount: typeof e.amount === 'number' ? e.amount : null,
      asset: 'USDC',
      status,
      ts: e.time || Date.now(),
      hash: e.hash || '',
      agentName: agent.name || `Agent ${(agent.id || '').slice(0,6)}`,
    };
  }

  function loadTradeActivity() {
    try { return JSON.parse(localStorage.getItem('arc.trade.activity.v1') || '[]').map(mapTradeRow); }
    catch { return []; }
  }
  async function loadAgentActivity() {
    if (!state.addr) return [];
    const list = await api(`/list?owner=${state.addr}`);
    if (Array.isArray(list) && list.length) {
      const batches = await Promise.all(list.map(a =>
        api(`/${a.id}/executions`).then(arr => Array.isArray(arr) ? arr.map(e => mapAgentExec(e, a)) : [])
      ));
      return batches.flat();
    }
    // Local fallback (matches agent.html)
    try {
      const agents = JSON.parse(localStorage.getItem('arcswap_agents') || '[]');
      const execs  = JSON.parse(localStorage.getItem('arcswap_execs') || '[]');
      const own = a => (a.owner || a.ownerAddress || '').toLowerCase();
      const mine = agents.filter(a => !state.addr || own(a) === state.addr.toLowerCase());
      const byId = Object.fromEntries(mine.map(a => [a.id, a]));
      return execs.map(e => byId[e.agentId] ? mapAgentExec(e, byId[e.agentId]) : null).filter(Boolean);
    } catch { return []; }
  }

  // ── LOAD + RENDER ─────────────────────────────────────────────
  async function loadAll() {
    if (!state.addr) { state.txs = []; render(); return; }
    showSkeleton();
    const [trade, agent] = await Promise.all([Promise.resolve(loadTradeActivity()), loadAgentActivity()]);
    const seen = new Set(), merged = [];
    for (const r of [...trade, ...agent]) { if (seen.has(r.id)) continue; seen.add(r.id); merged.push(r); }
    merged.sort((a, b) => (b.ts || 0) - (a.ts || 0));
    state.txs = merged;
    render();
  }

  function showSkeleton() {
    const feed = document.getElementById('hist-feed');
    feed.innerHTML = Array.from({length:5}).map(() => `
      <div class="hist-skel">
        <span class="hist-skel-line" style="width:42px;height:42px;border-radius:12px"></span>
        <span>
          <span class="hist-skel-line" style="width:55%;height:12px"></span><br/>
          <span class="hist-skel-line" style="width:30%;height:9px;margin-top:6px"></span>
        </span>
        <span class="hist-skel-line" style="width:78px;height:14px;justify-self:end"></span>
        <span class="hist-skel-line" style="width:64px;height:14px;justify-self:end"></span>
      </div>`).join('');
  }

  function chainTagHtml(key) {
    const c = chainOf(key);
    if (!c) return '';
    return `<span class="hist-chain-tag"><span class="cd" style="background:${c.color}"></span>${c.short}</span>`;
  }

  function rowHtml(t) {
    const isFail = t.status === 'failed';
    const icoCls = isFail ? 'k-fail' : `k-${t.tab}`;
    const glyph =
      isFail            ? '!' :
      t.tab === 'trade' ? '⇄' :
      t.tab === 'balance' ? '⊳' : '∞';

    const src = chainOf(t.srcChain), dst = chainOf(t.dstChain);
    const route = (src && dst && src.id !== dst.id)
      ? `${chainTagHtml(t.srcChain)}<span class="hist-row-arr">→</span>${chainTagHtml(t.dstChain)}`
      : (src ? chainTagHtml(t.srcChain) : '');

    const hashLink = (t.hash && t.srcChain)
      ? `<a href="${explorerTx(t.srcChain, t.hash)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${shortHash(t.hash)} ↗</a>`
      : '';

    const subParts = [route, hashLink, fmtRelTime(t.ts)].filter(Boolean);
    const sub = subParts.join('<span class="dot-sep">·</span>');

    const amtClass = t.tab === 'balance' && t.title?.includes('Bridge') ? 'down' : '';
    const amt = (t.amount != null)
      ? `<div class="hist-row-amt ${amtClass}">${fmtMoney(t.amount)}<small>${t.asset || 'USDC'}</small></div>`
      : `<div class="hist-row-amt" style="color:var(--muted-soft)">—</div>`;

    const explorerHref = (t.hash && t.srcChain) ? explorerTx(t.srcChain, t.hash) : '';

    return `
      <div class="hist-row" data-href="${escapeHtml(explorerHref)}">
        <div class="hist-row-ico ${icoCls}">${glyph}</div>
        <div class="hist-row-main">
          <div class="hist-row-title">${escapeHtml(t.title || '—')}</div>
          <div class="hist-row-sub">${sub}</div>
        </div>
        ${amt}
        <span class="hist-status ${t.status}"><span class="sd"></span>${t.status}</span>
      </div>`;
  }

  function counts() {
    const c = { all: state.txs.length, trade: 0, balance: 0, agent: 0 };
    for (const t of state.txs) { if (c[t.tab] != null) c[t.tab]++; }
    return c;
  }

  function render() {
    // Update tab counters
    const c = counts();
    for (const k of ['all','trade','balance','agent']) {
      const el = document.getElementById(`ct-${k}`); if (el) el.textContent = c[k];
    }

    const feed = document.getElementById('hist-feed');
    if (!state.addr) {
      feed.innerHTML = `
        <div class="hist-empty">
          <div class="hist-empty-ico">◇</div>
          <div class="hist-empty-t">Connect your wallet</div>
          <div class="hist-empty-s">Once connected, every trade, balance settlement, and agent run will appear here as a clean receipt.</div>
          <button class="hist-empty-cta" id="hist-connect-btn" type="button">Connect Wallet</button>
        </div>`;
      document.getElementById('hist-connect-btn').onclick = () => ARC.wallet.connect().catch(() => {});
      return;
    }

    const rows = state.tab === 'all' ? state.txs : state.txs.filter(t => t.tab === state.tab);

    if (!rows.length) {
      const cta = state.tab === 'trade'   ? { href: '/trade',   label: 'Make a trade →' }
                : state.tab === 'balance' ? { href: '/balance', label: 'Open Unified Balance →' }
                : state.tab === 'agent'   ? { href: '/agent',   label: 'Create an agent →' }
                : { href: '/trade', label: 'Start trading →' };
      feed.innerHTML = `
        <div class="hist-empty">
          <div class="hist-empty-ico">◇</div>
          <div class="hist-empty-t">No transactions found</div>
          <div class="hist-empty-s">Nothing in this tab yet. Your activity from ArcSwap will land here automatically.</div>
          <a class="hist-empty-cta" href="${cta.href}">${cta.label}</a>
        </div>`;
      return;
    }

    feed.innerHTML = rows.map(rowHtml).join('');
    feed.querySelectorAll('.hist-row').forEach(el => {
      el.addEventListener('click', () => {
        const href = el.getAttribute('data-href');
        if (href) window.open(href, '_blank', 'noopener');
      });
    });
  }

  // ── TAB WIRING ────────────────────────────────────────────────
  document.querySelectorAll('#hist-tabs .hist-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#hist-tabs .hist-tab').forEach(b => {
        b.classList.remove('active');
        b.setAttribute('aria-selected', 'false');
      });
      btn.classList.add('active');
      btn.setAttribute('aria-selected', 'true');
      state.tab = btn.getAttribute('data-tab');
      render();
    });
  });

  // ── WALLET REACTIVITY ─────────────────────────────────────────
  function onWalletChange() {
    const s = ARC.wallet.snapshot();
    state.addr = s.connected ? s.address : null;
    loadAll();
  }
  ARC.wallet.on(onWalletChange);
  onWalletChange();

  // ── REALTIME: poll trade activity from localStorage every 8s ──
  setInterval(() => {
    if (!state.addr) return;
    const fresh = loadTradeActivity();
    const others = state.txs.filter(t => t.tab === 'agent');
    const seen = new Set(), merged = [];
    for (const r of [...fresh, ...others]) { if (seen.has(r.id)) continue; seen.add(r.id); merged.push(r); }
    merged.sort((a, b) => (b.ts || 0) - (a.ts || 0));
    state.txs = merged;
    render();
  }, 8000);

})().catch(err => console.error('[history] fatal:', err));
</script>
</body>
</html>
