<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" width="1200" height="480">
  <defs>
    <linearGradient id="sbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0E1F39"/>
      <stop offset="1" stop-color="#0A1628"/>
    </linearGradient>
    <linearGradient id="cardA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="rgba(74,123,236,0.18)"/>
      <stop offset="1" stop-color="rgba(74,123,236,0.04)"/>
    </linearGradient>
    <linearGradient id="cardB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="rgba(77,214,219,0.18)"/>
      <stop offset="1" stop-color="rgba(77,214,219,0.04)"/>
    </linearGradient>
    <linearGradient id="cardC" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="rgba(244,200,154,0.18)"/>
      <stop offset="1" stop-color="rgba(244,200,154,0.04)"/>
    </linearGradient>
    <pattern id="sgrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.035)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="480" fill="url(#sbg)"/>
  <rect width="1200" height="480" fill="url(#sgrid)"/>

  <!-- Section title -->
  <g transform="translate(80 70)">
    <text x="0" y="0" font-family="DM Mono, monospace" font-size="13" font-weight="600" fill="#4DD6DB" letter-spacing="3">// WHAT'S LIVE TODAY</text>
    <text x="0" y="44" font-family="Inter, sans-serif" font-size="36" font-weight="800" fill="#F5F7FB" letter-spacing="-1">Three surfaces, one wallet.</text>
  </g>

  <!-- Card 1: Balance -->
  <g transform="translate(80 180)">
    <rect width="340" height="240" rx="18" fill="url(#cardA)" stroke="rgba(74,123,236,0.32)"/>
    <text x="28" y="48" font-family="DM Mono, monospace" font-size="12" font-weight="700" fill="#4A7BEC" letter-spacing="2.5">// BALANCE</text>
    <text x="28" y="92" font-family="Inter, sans-serif" font-size="28" font-weight="800" fill="#F5F7FB" letter-spacing="-.8">Unified Balance</text>
    <text x="28" y="132" font-family="Inter, sans-serif" font-size="15" fill="#C8D1E0">Spend USDC on Arc using funds</text>
    <text x="28" y="154" font-family="Inter, sans-serif" font-size="15" fill="#C8D1E0">sitting on 6+ chains. Powered by</text>
    <text x="28" y="176" font-family="Inter, sans-serif" font-size="15" fill="#C8D1E0">Circle Gateway. No manual bridge.</text>
    <g transform="translate(28 196)" font-family="DM Mono, monospace" font-size="11" font-weight="600" fill="#4A7BEC" letter-spacing="1.5">
      <text x="0" y="14">ETH · BASE · ARB · AVAX · OP · POLY</text>
    </g>
  </g>

  <!-- Card 2: Trade -->
  <g transform="translate(440 180)">
    <rect width="320" height="240" rx="18" fill="url(#cardB)" stroke="rgba(77,214,219,0.32)"/>
    <text x="28" y="48" font-family="DM Mono, monospace" font-size="12" font-weight="700" fill="#4DD6DB" letter-spacing="2.5">// TRADE</text>
    <text x="28" y="92" font-family="Inter, sans-serif" font-size="28" font-weight="800" fill="#F5F7FB" letter-spacing="-.8">Native Swap</text>
    <text x="28" y="124" font-family="Inter, sans-serif" font-size="28" font-weight="800" fill="#F5F7FB" letter-spacing="-.8">+ CCTP</text>
    <text x="28" y="164" font-family="Inter, sans-serif" font-size="15" fill="#C8D1E0">USDC ↔ EURC via Uniswap V2.</text>
    <text x="28" y="186" font-family="Inter, sans-serif" font-size="15" fill="#C8D1E0">Burn-and-mint bridging native</text>
    <text x="28" y="208" font-family="Inter, sans-serif" font-size="15" fill="#C8D1E0">via CCTP V2. One surface.</text>
  </g>

  <!-- Card 3: Create Token -->
  <g transform="translate(780 180)">
    <rect width="340" height="240" rx="18" fill="url(#cardC)" stroke="rgba(244,200,154,0.32)"/>
    <text x="28" y="48" font-family="DM Mono, monospace" font-size="12" font-weight="700" fill="#F4C89A" letter-spacing="2.5">// CREATE TOKEN</text>
    <text x="28" y="92" font-family="Inter, sans-serif" font-size="28" font-weight="800" fill="#F5F7FB" letter-spacing="-.8">Token Launcher</text>
    <text x="28" y="132" font-family="Inter, sans-serif" font-size="15" fill="#C8D1E0">Deploy an ERC-20 on Arc with</text>
    <text x="28" y="154" font-family="Inter, sans-serif" font-size="15" fill="#C8D1E0">a wallet click. No Hardhat,</text>
    <text x="28" y="176" font-family="Inter, sans-serif" font-size="15" fill="#C8D1E0">no Foundry, no Solidity.</text>
    <g transform="translate(28 196)" font-family="DM Mono, monospace" font-size="11" font-weight="600" fill="#F4C89A" letter-spacing="1.5">
      <text x="0" y="14">PAY GAS IN USDC · MINT ON CONFIRM</text>
    </g>
  </g>
</svg>
