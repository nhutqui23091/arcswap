<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0A1628"/>
      <stop offset=".5" stop-color="#0E1F39"/>
      <stop offset="1" stop-color="#133155"/>
    </linearGradient>
    <linearGradient id="usycG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7BE495"/>
      <stop offset="1" stop-color="#4DD6DB"/>
    </linearGradient>
    <radialGradient id="orb1" cx=".2" cy=".3" r=".6">
      <stop offset="0" stop-color="#7BE495" stop-opacity=".25"/>
      <stop offset="1" stop-color="#7BE495" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx=".85" cy=".7" r=".5">
      <stop offset="0" stop-color="#4DD6DB" stop-opacity=".22"/>
      <stop offset="1" stop-color="#4DD6DB" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
    <filter id="glow"><feGaussianBlur stdDeviation="3"/></filter>
  </defs>

  <rect width="1200" height="600" fill="url(#bg)"/>
  <rect width="1200" height="600" fill="url(#grid)"/>
  <rect width="1200" height="600" fill="url(#orb1)"/>
  <rect width="1200" height="600" fill="url(#orb2)"/>

  <!-- T-bill icon (stylized treasury) -->
  <g transform="translate(140 220)" opacity=".95">
    <rect x="0" y="0" width="180" height="120" rx="8" fill="#0A1628" stroke="#7BE495" stroke-width="2"/>
    <rect x="14" y="14" width="152" height="6" rx="3" fill="#7BE495" opacity=".5"/>
    <rect x="14" y="32" width="120" height="4" rx="2" fill="rgba(255,255,255,0.18)"/>
    <rect x="14" y="44" width="100" height="4" rx="2" fill="rgba(255,255,255,0.12)"/>
    <text x="90" y="90" font-family="DM Mono, monospace" font-size="36" font-weight="700" fill="#7BE495" text-anchor="middle">$1.00</text>
    <text x="90" y="108" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="rgba(255,255,255,0.5)" text-anchor="middle" letter-spacing="2">U.S. T-BILL</text>
  </g>

  <!-- Yield arrow -->
  <g transform="translate(360 270)">
    <path d="M 0 20 L 60 20 M 50 10 L 60 20 L 50 30" stroke="#4DD6DB" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="30" y="0" font-family="DM Mono, monospace" font-size="12" font-weight="700" fill="#4DD6DB" text-anchor="middle" letter-spacing="2">~4.85% APY</text>
  </g>

  <!-- USYC token icon -->
  <g transform="translate(460 200)">
    <circle cx="80" cy="80" r="80" fill="#0A1628" stroke="url(#usycG)" stroke-width="3"/>
    <text x="80" y="92" font-family="Inter, sans-serif" font-size="38" font-weight="900" fill="url(#usycG)" text-anchor="middle" letter-spacing="-1">USYC</text>
  </g>

  <!-- Right side: Title -->
  <g transform="translate(680 230)">
    <text x="0" y="0" font-family="DM Mono, monospace" font-size="14" font-weight="600" fill="#7BE495" letter-spacing="3">// EXPLAINER</text>
    <text x="0" y="60" font-family="Inter, sans-serif" font-size="56" font-weight="900" fill="#F5F7FB" letter-spacing="-2">USYC,</text>
    <text x="0" y="116" font-family="Inter, sans-serif" font-size="56" font-weight="900" fill="#F5F7FB" letter-spacing="-2">explained</text>
    <text x="0" y="160" font-family="Inter, sans-serif" font-size="18" font-weight="400" fill="#8CA0BD">Tokenized U.S. Treasury yield,</text>
    <text x="0" y="184" font-family="Inter, sans-serif" font-size="18" font-weight="400" fill="#8CA0BD">on-chain, in plain English.</text>
  </g>

  <!-- ArcSwap brand mark, bottom -->
  <g transform="translate(60 540)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="20" font-weight="900" fill="#F5F7FB" letter-spacing="-.5">ArcSwap</text>
    <text x="100" y="0" font-family="DM Mono, monospace" font-size="13" fill="#8CA0BD" letter-spacing="2">// arcswap.net</text>
  </g>
</svg>
