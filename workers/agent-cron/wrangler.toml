# ArcSwap Agent Cron — Cloudflare Worker config.
#
# Deploy with:
#   cd workers/agent-cron
#   wrangler deploy
#
# Set the secret (one-time):
#   wrangler secret put CRON_SECRET
#   (paste the same 64-hex value you set on the Pages project)

name = "arcswap-agent-cron"
main = "src/index.js"
compatibility_date = "2025-01-01"

# Fire every 5 minutes. We previously ran every minute, but that pushed us
# toward the Workers KV free-tier daily caps (especially the 1k/day list cap,
# since handleCronTick used to kv.list() every tick). 5-minute resolution is
# fine for our use cases:
#   - topup mode is throttled to fire at most once per 6 hours per agent
#   - schedule mode fires at user-chosen HH:MM with at most 5 min trigger lag
[triggers]
crons = ["*/5 * * * *"]

# NOTE on architecture:
# We do NOT use a service binding here. Wrangler v3 doesn't fully support
# Worker→Pages-project service bindings (the API returns "Worker not found"
# even when the Pages project exists with that name). Instead the Worker
# fetches the public URL https://arcswap.net/api/agent/cron-tick directly.
#
# Why this still works (vs GitHub Actions hitting the same URL):
# Cloudflare Workers running inside the CF network are NOT subject to
# basic Bot Fight Mode the same way external clients are. Internal
# traffic from a Worker in the same account gets routed differently and
# typically passes Bot Fight Mode without challenge. If it does get
# challenged, we have the WAF Custom Rule "Allow agent cron-tick" with
# Skip action on /api/agent/cron-tick as backup.

# Logging: keep observability on so we can stream tail
[observability]
enabled = true
